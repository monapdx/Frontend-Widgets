<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary Definition Generator</title>
<link rel="stylesheet" href="styles-vanilla.css">
    <style>
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
img, video, canvas, svg { max-width: 100%; height: auto; }

    </style>
</head>
<body>
  <div class="app">
    <section class="panel controls">
      <div class="eyebrow">Frontend Widget</div>
      <h1>Dictionary Definition Generator</h1>
      <p class="intro">
       
      </p>

      <div class="field">
        <label for="wordInput">Word</label>
        <input id="wordInput" type="text" placeholder="" />
      </div>

      <div class="grid-two">
        <div class="field">
          <label for="partOfSpeech">Part of speech</label>
          <select id="partOfSpeech">
            <option value="noun">noun</option>
            <option value="verb">verb</option>
            <option value="adjective">adjective</option>
            <option value="adverb">adverb</option>
            <option value="pronoun">pronoun</option>
            <option value="preposition">preposition</option>
            <option value="conjunction">conjunction</option>
            <option value="interjection">interjection</option>
            <option value="article">article</option>
          </select>
        </div>

        <div class="field">
          <label for="pronunciationInput">Pronunciation</label>
          <input id="pronunciationInput" type="text" placeholder="" />
        </div>
      </div>

      <div class="field">
        <label for="syllablesInput">Syllables</label>
        <input id="syllablesInput" type="text" placeholder="Auto-generated from the word" />
        <div class="hint">Use hyphens between syllables. Example: lu-mi-nes-cence</div>
      </div>

      <div class="field">
        <label for="definitionsInput">Definition(s)</label>
        <textarea id="definitionsInput" placeholder="Enter one definition per line.&#10;Example:&#10;the emission of light by a substance not resulting from heat&#10;a soft glowing quality"></textarea>
        <div class="hint">Each new line becomes its own numbered definition.</div>
      </div>

      <div class="field">
        <label for="exampleInput">Usage note or example sentence</label>
        <textarea id="exampleInput" placeholder=""></textarea>
      </div>

      <div class="field">
        <div class="toggle-row">
          <input id="capitalizeToggle" type="checkbox" checked />
          <label for="capitalizeToggle" style="margin: 0; font-weight: 600;">Capitalize word in preview heading</label>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="generateBtn">Generate Entry</button>
        <button class="secondary" id="sampleBtn" type="button">Load Sample</button>
        <button class="secondary" id="resetBtn" type="button">Reset</button>
      </div>
    </section>

    <section class="panel preview-wrap">
      <div class="preview-head">
        <h2 class="preview-title">Generated Dictionary Entry</h2>
        <div class="output-tools">
          <button class="secondary" id="copyBtn" type="button">Copy HTML</button>
          <button class="secondary" id="copyTextBtn" type="button">Copy Plain Text</button>
        </div>
      </div>

      <div id="previewArea">
        <div class="empty-state">
          <div>
            <strong>No entry yet</strong>
            Fill out the fields and click <em>Generate Entry</em> to create a polished dictionary-style definition block.
          </div>
        </div>
      </div>
      <div class="copy-status" id="copyStatus"></div>
    </section>
  </div>

  <script>
    const wordInput = document.getElementById('wordInput');
    const partOfSpeech = document.getElementById('partOfSpeech');
    const pronunciationInput = document.getElementById('pronunciationInput');
    const syllablesInput = document.getElementById('syllablesInput');
    const definitionsInput = document.getElementById('definitionsInput');
    const exampleInput = document.getElementById('exampleInput');
    const capitalizeToggle = document.getElementById('capitalizeToggle');
    const generateBtn = document.getElementById('generateBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const previewArea = document.getElementById('previewArea');
    const copyBtn = document.getElementById('copyBtn');
    const copyTextBtn = document.getElementById('copyTextBtn');
    const copyStatus = document.getElementById('copyStatus');

    let lastGeneratedHTML = '';
    let lastGeneratedText = '';

    const vowels = 'aeiouy';

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function titleCaseWord(word) {
      if (!word) return '';
      return word.charAt(0).toUpperCase() + word.slice(1);
    }

    function syllabify(word) {
      const clean = (word || '').toLowerCase().replace(/[^a-z]/g, '');
      if (!clean) return '';
      if (clean.length <= 3) return clean;

      const chunks = [];
      let current = '';

      for (let i = 0; i < clean.length; i++) {
        const char = clean[i];
        const prev = clean[i - 1] || '';
        const next = clean[i + 1] || '';
        const isVowel = vowels.includes(char);
        const prevIsVowel = vowels.includes(prev);
        const nextIsVowel = vowels.includes(next);

        current += char;

        const endOfWord = i === clean.length - 1;
        const vowelToConsonantBreak = isVowel && next && !nextIsVowel;
        const consonantClusterBreak = !isVowel && prevIsVowel && nextIsVowel;
        const doubleConsonantBreak = !isVowel && next && char === next && current.length > 1;

        if (!endOfWord) {
          if (vowelToConsonantBreak && i < clean.length - 2) {
            chunks.push(current);
            current = '';
          } else if (consonantClusterBreak) {
            chunks.push(current.slice(0, -1));
            current = current.slice(-1);
          } else if (doubleConsonantBreak) {
            chunks.push(current.slice(0, -1));
            current = current.slice(-1);
          }
        }
      }

      if (current) chunks.push(current);

      const filtered = chunks.filter(Boolean);
      return filtered.length ? filtered.join('-') : clean;
    }

    function getDefinitions() {
      return definitionsInput.value
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
    }

    function buildEntryData() {
      const rawWord = wordInput.value.trim();
      const word = capitalizeToggle.checked ? titleCaseWord(rawWord) : rawWord;
      const pronunciation = pronunciationInput.value.trim();
      const manualSyllables = syllablesInput.value.trim();
      const syllables = manualSyllables || syllabify(rawWord);
      const definitions = getDefinitions();
      const example = exampleInput.value.trim();
      const pos = partOfSpeech.value.trim();

      return { word, pronunciation, syllables, definitions, example, pos, rawWord };
    }

    function buildHTML(data) {
      const safeWord = escapeHtml(data.word || 'Untitled');
      const safeSyllables = escapeHtml(data.syllables || '—');
      const safePronunciation = escapeHtml(data.pronunciation || 'Not provided');
      const safePos = escapeHtml(data.pos || 'word');
      const defs = data.definitions.length
        ? data.definitions.map(def => `<li>${escapeHtml(def)}</li>`).join('')
        : '<li>No definition entered yet.</li>';

      const exampleHTML = data.example
        ? `<div class="mini-note">Example usage</div><div class="tagline">${escapeHtml(data.example)}</div>`
        : `<div class="tagline">Generated in a dictionary-inspired layout with syllables, part of speech, and numbered definitions.</div>`;

      return `
        <article class="card dictionary-entry">
          <h3 class="entry-word">${safeWord}</h3>
          <div class="phonetic-row">
            <span class="syllables">${safeSyllables}</span>
            <span class="part-of-speech">${safePos}</span>
          </div>
          <div class="divider"></div>
          <div class="pronunciation"><strong>Pronunciation:</strong> ${safePronunciation}</div>
          <div class="definitions-block">
            <section class="sense-group">
              <div class="sense-label">Definition</div>
              <ol class="definition-list">${defs}</ol>
            </section>
          </div>
          ${exampleHTML}
        </article>
      `;
    }

    function buildPlainText(data) {
      const lines = [];
      lines.push(data.word || 'Untitled');
      lines.push(`${data.syllables || '—'} • ${data.pos || 'word'}`);
      lines.push(`Pronunciation: ${data.pronunciation || 'Not provided'}`);
      lines.push('');
      lines.push('Definitions:');

      if (data.definitions.length) {
        data.definitions.forEach((def, index) => {
          lines.push(`${index + 1}. ${def}`);
        });
      } else {
        lines.push('1. No definition entered yet.');
      }

      if (data.example) {
        lines.push('');
        lines.push(`Example: ${data.example}`);
      }

      return lines.join('\n');
    }

    function renderEntry() {
      const data = buildEntryData();

      if (!data.rawWord) {
        previewArea.innerHTML = `
          <div class="empty-state">
            <div>
              <strong>Add a word first</strong>
              The generator needs at least a word in order to build the entry.
            </div>
          </div>
        `;
        lastGeneratedHTML = '';
        lastGeneratedText = '';
        return;
      }

      if (!syllablesInput.value.trim()) {
        syllablesInput.value = syllabify(data.rawWord);
        data.syllables = syllablesInput.value.trim();
      }

      const html = buildHTML(data);
      const text = buildPlainText(data);

      previewArea.innerHTML = html;
      lastGeneratedHTML = html.trim();
      lastGeneratedText = text;
      copyStatus.textContent = '';
    }

    function setSample() {
      wordInput.value = '';
      partOfSpeech.value = '';
      pronunciationInput.value = '';
      syllablesInput.value = '';
      definitionsInput.value = [
        '',
        ''
      ].join('\n');
      exampleInput.value = '';
      capitalizeToggle.checked = true;
      renderEntry();
    }

    function resetForm() {
      wordInput.value = '';
      partOfSpeech.value = 'noun';
      pronunciationInput.value = '';
      syllablesInput.value = '';
      definitionsInput.value = '';
      exampleInput.value = '';
      capitalizeToggle.checked = true;
      previewArea.innerHTML = `
        <div class="empty-state">
          <div>
            <strong>No entry yet</strong>
            Fill out the fields and click <em>Generate Entry</em> to create a polished dictionary-style definition block.
          </div>
        </div>
      `;
      lastGeneratedHTML = '';
      lastGeneratedText = '';
      copyStatus.textContent = '';
    }

    async function copyToClipboard(text, successMessage) {
      if (!text) {
        copyStatus.textContent = 'Generate an entry first.';
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        copyStatus.textContent = successMessage;
      } catch (error) {
        copyStatus.textContent = 'Clipboard copy failed in this browser.';
      }
    }

    wordInput.addEventListener('input', () => {
      if (!syllablesInput.matches(':focus')) {
        syllablesInput.value = syllabify(wordInput.value.trim());
      }
    });

    generateBtn.addEventListener('click', renderEntry);
    sampleBtn.addEventListener('click', setSample);
    resetBtn.addEventListener('click', resetForm);
    copyBtn.addEventListener('click', () => copyToClipboard(lastGeneratedHTML, 'HTML copied to clipboard.'));
    copyTextBtn.addEventListener('click', () => copyToClipboard(lastGeneratedText, 'Plain text copied to clipboard.'));

    [wordInput, pronunciationInput, syllablesInput, definitionsInput, exampleInput, partOfSpeech, capitalizeToggle].forEach(el => {
      el.addEventListener('keydown', event => {
        if (event.key === 'Enter' && el.tagName !== 'TEXTAREA') {
          event.preventDefault();
          renderEntry();
        }
      });
    });

    setSample();
  </script>
</body>
</html>
