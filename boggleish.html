<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boggleish</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#f5f5f5;
}

h1{
    margin-bottom:10px;
}

.game{
    width:min(100%,420px);
}

.status{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
    font-weight:bold;
}

.board{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:15px;
}

.tile{
    background:white;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    aspect-ratio:1;
    font-size:clamp(24px,6vw,36px);
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controls input{
    flex:1;
    padding:12px;
    font-size:16px;
}

.controls button{
    padding:12px 16px;
    font-size:16px;
    cursor:pointer;
}

.words{
    margin-top:15px;
    background:white;
    padding:10px;
    border-radius:8px;
}

@media (max-width:600px){

    body{
        padding:10px;
    }

    .controls{
        flex-direction:column;
    }

    .controls input,
    .controls button{
        width:100%;
    }

}
</style>
</head>

<body>

<h1>Boggleish</h1>

<div class="game">

<div class="status">
<div>Time: <span id="timer">60</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<div class="board" id="board"></div>

<div class="controls">
<input id="guess" placeholder="Enter word" autocomplete="off">
<button onclick="submitWord()">Submit</button>
<button onclick="newBoard()">New Board</button>
</div>

<div class="words">
<strong>Found Words</strong>
<ul id="wordList"></ul>
</div>

</div>

<script>

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const ROUND_TIME = 60

let time = ROUND_TIME
let score = 0
let timerInterval

function randomLetter(){
    return letters[Math.floor(Math.random()*letters.length)]
}

function updateDisplay(){
    document.getElementById("timer").textContent = time
    document.getElementById("score").textContent = score
}

function startTimer(){

    clearInterval(timerInterval)

    time = ROUND_TIME

    timerInterval = setInterval(() => {

        time--

        updateDisplay()

        if(time <= 0){
            clearInterval(timerInterval)
            alert("Time's up! Final score: " + score)
        }

    },1000)

}

function newBoard(){

    const board = document.getElementById("board")
    board.innerHTML=""

    for(let i=0;i<16;i++){

        const tile = document.createElement("div")
        tile.className="tile"
        tile.textContent=randomLetter()

        board.appendChild(tile)

    }

    document.getElementById("wordList").innerHTML=""
    document.getElementById("guess").value=""

    score = 0
    updateDisplay()

    startTimer()

}

function submitWord(){

    if(time <= 0) return

    const input = document.getElementById("guess")
    const word = input.value.trim()

    if(!word) return

    const li = document.createElement("li")
    li.textContent = word

    document.getElementById("wordList").appendChild(li)

    score += word.length

    input.value=""

    updateDisplay()

}

document.getElementById("guess").addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        e.preventDefault()
        submitWord()
    }

})

newBoard()

</script>

</body>
</html>
