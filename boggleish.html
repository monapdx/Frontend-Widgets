<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Boggleish</title>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --page-bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #222;
    --border: #e8e8e8;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --radius: 12px;
    --gap: 12px;
    --vvh: 100dvh;
    --board-size: 320px;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--page-bg);
    overflow-x: hidden;
  }

  body {
    font-family: Arial, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  .game {
    width: min(100%, 460px);
    height: var(--vvh);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    overflow: hidden;
  }

  .status {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    flex: 0 0 auto;
  }

  .status-box {
    background: var(--card-bg);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
    font-weight: bold;
    box-shadow: var(--shadow);
  }

  .board-wrap {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 10px;
    box-shadow: var(--shadow);
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: var(--board-size);
    height: var(--board-size);
    max-width: 100%;
    max-height: 100%;
    margin: 0 auto;
  }

  .tile {
    background: #fafafa;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1 / 1;
    font-size: clamp(22px, 6vw, 34px);
    font-weight: bold;
    box-shadow: inset 0 0 0 1px var(--border), 0 2px 6px rgba(0,0,0,0.10);
    user-select: none;
    -webkit-user-select: none;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    flex: 0 0 auto;
  }

  .controls input {
    grid-column: 1 / -1;
    width: 100%;
    min-width: 0;
    height: 48px;
    padding: 0 14px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 10px;
    outline: none;
    background: white;
  }

  .controls button {
    width: 100%;
    min-width: 0;
    height: 48px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    cursor: pointer;
    touch-action: manipulation;
  }

  .words {
    background: var(--card-bg);
    padding: 12px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 0 0 auto;
  }

  .words h2 {
    font-size: 16px;
    margin: 0 0 8px;
  }

  .words ul {
    margin: 0;
    padding-left: 20px;
    word-break: break-word;
    overflow: auto;
    max-height: 140px;
  }

  .shake {
    animation: shakeBoard 0.45s ease;
  }

  @keyframes shakeBoard {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-8px) rotate(-1deg); }
    30%  { transform: translateX(8px) rotate(1deg); }
    45%  { transform: translateX(-7px) rotate(-1deg); }
    60%  { transform: translateX(7px) rotate(1deg); }
    75%  { transform: translateX(-4px) rotate(-0.5deg); }
    90%  { transform: translateX(4px) rotate(0.5deg); }
    100% { transform: translateX(0); }
  }

  @media (max-width: 600px) {
    .game {
      width: 100%;
      padding: 10px;
      gap: 10px;
    }

    .board-wrap {
      padding: 8px;
    }

    .tile {
      font-size: clamp(20px, 7vw, 30px);
    }

    .words ul {
      max-height: 100px;
    }
  }

  body.keyboard-open .game {
    padding-bottom: 6px;
    gap: 8px;
  }

  body.keyboard-open .words {
    display: none;
  }

  body.keyboard-open .status-box {
    padding: 8px 10px;
  }

  body.keyboard-open .board-wrap {
    flex: 1 1 auto;
    min-height: 0;
    align-items: flex-start;
  }

  body.keyboard-open .controls {
    flex: 0 0 auto;
  }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="status" id="status">
    <div class="status-box">Time: <span id="timer">180</span>s</div>
    <div class="status-box">Score: <span id="score">0</span></div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>

  <div class="controls" id="controls">
    <input id="guess" type="text" placeholder="Enter word" autocomplete="off" autocapitalize="characters" />
    <button id="submitBtn" type="button">Submit</button>
    <button id="newBoardBtn" type="button">New Board</button>
    <button id="shakeBtn" type="button">Shake</button>
  </div>

  <div class="words" id="wordsPanel">
    <h2>Found Words</h2>
    <ul id="wordList"></ul>
  </div>
</div>

<script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const BOARD_SIZE = 16;
  const ROUND_TIME = 180;

  let score = 0;
  let timeLeft = ROUND_TIME;
  let timerInterval = null;

  const gameEl = document.getElementById("game");
  const statusEl = document.getElementById("status");
  const boardEl = document.getElementById("board");
  const boardWrapEl = document.getElementById("boardWrap");
  const controlsEl = document.getElementById("controls");
  const wordsPanelEl = document.getElementById("wordsPanel");
  const timerEl = document.getElementById("timer");
  const scoreEl = document.getElementById("score");
  const guessEl = document.getElementById("guess");
  const wordListEl = document.getElementById("wordList");
  const submitBtn = document.getElementById("submitBtn");
  const newBoardBtn = document.getElementById("newBoardBtn");
  const shakeBtn = document.getElementById("shakeBtn");

  function randomLetter() {
    return letters[Math.floor(Math.random() * letters.length)];
  }

  function updateDisplay() {
    timerEl.textContent = timeLeft;
    scoreEl.textContent = score;
  }

  function buildBoard() {
    boardEl.innerHTML = "";
    for (let i = 0; i < BOARD_SIZE; i++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = randomLetter();
      boardEl.appendChild(tile);
    }
  }

  function clearWords() {
    wordListEl.innerHTML = "";
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = ROUND_TIME;
    updateDisplay();

    timerInterval = setInterval(() => {
      timeLeft -= 1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        clearInterval(timerInterval);
        updateDisplay();
        alert("Time's up! Final score: " + score);
        return;
      }
      updateDisplay();
    }, 1000);
  }

  function newBoard() {
    buildBoard();
    clearWords();
    guessEl.value = "";
    score = 0;
    startTimer();
    updateDisplay();
    requestAnimationFrame(updateViewportLayout);
  }

  function shakeBoard() {
    boardWrapEl.classList.remove("shake");
    void boardWrapEl.offsetWidth;
    boardWrapEl.classList.add("shake");

    buildBoard();
    clearWords();
    guessEl.value = "";
    score = 0;
    startTimer();
    updateDisplay();
    requestAnimationFrame(updateViewportLayout);
  }

  function submitWord() {
    if (timeLeft <= 0) return;

    const word = guessEl.value.trim();
    if (!word) return;

    const li = document.createElement("li");
    li.textContent = word;
    wordListEl.appendChild(li);

    score += word.length;
    guessEl.value = "";
    updateDisplay();

    requestAnimationFrame(() => {
      updateViewportLayout();
      guessEl.focus();
    });
  }

  function getViewportHeight() {
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
  }

  function isKeyboardOpen() {
    if (!window.visualViewport) return false;
    if (window.innerWidth > 700) return false;
    return window.visualViewport.height < window.innerHeight * 0.82;
  }

  function updateViewportHeightVar() {
    document.documentElement.style.setProperty("--vvh", `${getViewportHeight()}px`);
  }

  function updateBoardSize() {
    updateViewportHeightVar();

    const keyboardOpen = isKeyboardOpen();
    document.body.classList.toggle("keyboard-open", keyboardOpen);

    const viewportHeight = getViewportHeight();
    const viewportWidth = Math.min(window.innerWidth, 460);

    const gameStyles = getComputedStyle(gameEl);
    const gamePadTop = parseFloat(gameStyles.paddingTop) || 0;
    const gamePadBottom = parseFloat(gameStyles.paddingBottom) || 0;
    const gap = parseFloat(gameStyles.gap) || 0;

    const statusHeight = statusEl.offsetHeight;
    const controlsHeight = controlsEl.offsetHeight;
    const wordsHeight = keyboardOpen ? 0 : wordsPanelEl.offsetHeight;

    const reservedHeight =
      gamePadTop +
      gamePadBottom +
      statusHeight +
      controlsHeight +
      wordsHeight +
      (keyboardOpen ? gap * 2 : gap * 3);

    const wrapStyles = getComputedStyle(boardWrapEl);
    const wrapPadTop = parseFloat(wrapStyles.paddingTop) || 0;
    const wrapPadBottom = parseFloat(wrapStyles.paddingBottom) || 0;
    const wrapPadLeft = parseFloat(wrapStyles.paddingLeft) || 0;
    const wrapPadRight = parseFloat(wrapStyles.paddingRight) || 0;

    const availableHeight = viewportHeight - reservedHeight - wrapPadTop - wrapPadBottom - 4;
    const availableWidth = viewportWidth - gamePadTop - gamePadBottom - wrapPadLeft - wrapPadRight - 4;

    let boardSize = Math.min(availableWidth, availableHeight, 420);
    boardSize = Math.max(160, boardSize);

    document.documentElement.style.setProperty("--board-size", `${boardSize}px`);
  }

  function updateViewportLayout() {
    updateBoardSize();

    if (isKeyboardOpen()) {
      setTimeout(() => {
        guessEl.scrollIntoView({
          behavior: "smooth",
          block: "nearest"
        });
      }, 50);
    }
  }

  submitBtn.addEventListener("click", submitWord);
  newBoardBtn.addEventListener("click", newBoard);
  shakeBtn.addEventListener("click", shakeBoard);

  guessEl.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      submitWord();
    }
  });

  guessEl.addEventListener("focus", () => {
    setTimeout(updateViewportLayout, 180);
  });

  guessEl.addEventListener("blur", () => {
    setTimeout(updateViewportLayout, 120);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateViewportLayout);
    window.visualViewport.addEventListener("scroll", updateViewportLayout);
  }

  window.addEventListener("resize", updateViewportLayout);
  window.addEventListener("orientationchange", () => {
    setTimeout(updateViewportLayout, 220);
  });

  window.addEventListener("load", () => {
    newBoard();
    updateViewportLayout();
  });
</script>
</body>
</html>
