<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boggleish</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #222;
}

/* Main app fills the actual visible screen */
.app {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.game {
  width: min(100%, 460px);
  min-height: calc(100dvh - 20px);
  display: flex;
  flex-direction: column;
}

/* Top content can scroll if keyboard steals space */
.game-main {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 10px;
}

/* Keep input/buttons accessible near bottom */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
  padding-top: 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: #f5f5f5;
  position: sticky;
  bottom: 0;
}

.controls input {
  flex: none;
  width: 100%;
  height: 48px;
  padding: 0 14px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  outline: none;
}

.controls button {
  width: 100%;
  height: 48px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  cursor: pointer;
}

.board-wrap {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.14);
  margin-bottom: 14px;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
}

.tile {
  background: #fafafa;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1 / 1;
  font-size: clamp(24px, 7vw, 36px);
  font-weight: bold;
  box-shadow: inset 0 0 0 1px #e8e8e8, 0 2px 6px rgba(0,0,0,0.12);
  user-select: none;
}

@media (max-width: 600px) {
  .app {
    padding: 8px;
  }

  .game {
    width: 100%;
    min-height: calc(100dvh - 16px);
  }

  .controls {
    flex-direction: column;
  }

  .tile {
    font-size: clamp(22px, 8vw, 32px);
  }
}
</style>
</head>
<body>
  <h1>Boggleish</h1>

  <div class="game">
    <div class="status">
      <div class="status-box">Time: <span id="timer">60</span>s</div>
      <div class="status-box">Score: <span id="score">0</span></div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </div>

    <div class="controls">
      <input id="guess" type="text" placeholder="Enter word" autocomplete="off" />
      <button id="submitBtn" type="button">Submit</button>
      <button id="newBoardBtn" type="button">New Board</button>
      <button id="shakeBtn" type="button">Shake</button>
    </div>

    <div class="words">
      <h2>Found Words</h2>
      <ul id="wordList"></ul>
    </div>
  </div>

<script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const BOARD_SIZE = 16;
  const ROUND_TIME = 180;

  let score = 0;
  let timeLeft = ROUND_TIME;
  let timerInterval = null;

  const boardEl = document.getElementById("board");
  const boardWrapEl = document.getElementById("boardWrap");
  const timerEl = document.getElementById("timer");
  const scoreEl = document.getElementById("score");
  const guessEl = document.getElementById("guess");
  const wordListEl = document.getElementById("wordList");
  const submitBtn = document.getElementById("submitBtn");
  const newBoardBtn = document.getElementById("newBoardBtn");
  const shakeBtn = document.getElementById("shakeBtn");

  function randomLetter() {
    return letters[Math.floor(Math.random() * letters.length)];
  }

  function updateDisplay() {
    timerEl.textContent = timeLeft;
    scoreEl.textContent = score;
  }

  function buildBoard() {
    boardEl.innerHTML = "";

    for (let i = 0; i < BOARD_SIZE; i++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.textContent = randomLetter();
      boardEl.appendChild(tile);
    }
  }

  function clearWords() {
    wordListEl.innerHTML = "";
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = ROUND_TIME;
    updateDisplay();

    timerInterval = setInterval(() => {
      timeLeft -= 1;
      updateDisplay();

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timeLeft = 0;
        updateDisplay();
        alert("Time's up! Final score: " + score);
      }
    }, 1000);
  }

  function newBoard() {
    buildBoard();
    clearWords();
    guessEl.value = "";
    score = 0;
    startTimer();
    updateDisplay();
    guessEl.focus();
  }

  function shakeBoard() {
    boardWrapEl.classList.remove("shake");
    void boardWrapEl.offsetWidth;
    boardWrapEl.classList.add("shake");

    buildBoard();
    clearWords();
    guessEl.value = "";
    score = 0;
    startTimer();
    updateDisplay();
    guessEl.focus();
  }

  function submitWord() {
    if (timeLeft <= 0) return;

    const word = guessEl.value.trim();
    if (!word) return;

    const li = document.createElement("li");
    li.textContent = word;
    wordListEl.appendChild(li);

    score += word.length;
    guessEl.value = "";
    updateDisplay();
  }

  submitBtn.addEventListener("click", submitWord);
  newBoardBtn.addEventListener("click", newBoard);
  shakeBtn.addEventListener("click", shakeBoard);

  guessEl.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      submitWord();
    }
  });

  newBoard();
</script>
</body>
</html>
