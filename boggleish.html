<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boggleish</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #222;
  display: flex;
  justify-content: center;
}

.game {
  width: min(100%, 460px);
  padding: 12px;
}

h1 {
  margin: 0 0 12px;
  text-align: center;
}

.status {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.status-box {
  flex: 1 1 140px;
  background: white;
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}

.board-wrap {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.14);
  margin-bottom: 14px;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
}

.tile {
  background: #fafafa;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1 / 1;
  font-size: clamp(24px, 7vw, 36px);
  font-weight: bold;
  box-shadow: inset 0 0 0 1px #e8e8e8, 0 2px 6px rgba(0,0,0,0.12);
  user-select: none;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.controls input {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  outline: none;
  background: white;
}

.controls button {
  width: 100%;
  height: 48px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  cursor: pointer;
}

.words {
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}

.words h2 {
  font-size: 16px;
  margin: 0 0 8px;
}

.words ul {
  margin: 0;
  padding-left: 20px;
  word-break: break-word;
}

.shake {
  animation: shakeBoard 0.45s ease;
}

@keyframes shakeBoard {
  0%   { transform: translateX(0); }
  15%  { transform: translateX(-8px) rotate(-1deg); }
  30%  { transform: translateX(8px) rotate(1deg); }
  45%  { transform: translateX(-7px) rotate(-1deg); }
  60%  { transform: translateX(7px) rotate(1deg); }
  75%  { transform: translateX(-4px) rotate(-0.5deg); }
  90%  { transform: translateX(4px) rotate(0.5deg); }
  100% { transform: translateX(0); }
}

@media (max-width: 600px) {
  .game {
    width: 100%;
    padding: 10px;
    min-height: var(--vvh, 100vh);
  }

  .board-wrap {
    padding: 8px;
  }

  .tile {
    font-size: clamp(20px, 7vw, 30px);
  }
}
</style>
</head>
<body>
  <h1>Boggleish</h1>

  <div class="game">
    <div class="status">
      <div class="status-box">Time: <span id="timer">60</span>s</div>
      <div class="status-box">Score: <span id="score">0</span></div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </div>

    <div class="controls">
      <input id="guess" type="text" placeholder="Enter word" autocomplete="off" />
      <button id="submitBtn" type="button">Submit</button>
      <button id="newBoardBtn" type="button">New Board</button>
      <button id="shakeBtn" type="button">Shake</button>
    </div>

    <div class="words">
      <h2>Found Words</h2>
      <ul id="wordList"></ul>
    </div>
  </div>

<script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const BOARD_SIZE = 16;
const ROUND_TIME = 180;

let score = 0;
let timeLeft = ROUND_TIME;
let timerInterval = null;

const boardEl = document.getElementById("board");
const boardWrapEl = document.getElementById("boardWrap");
const timerEl = document.getElementById("timer");
const scoreEl = document.getElementById("score");
const guessEl = document.getElementById("guess");
const wordListEl = document.getElementById("wordList");
const submitBtn = document.getElementById("submitBtn");
const newBoardBtn = document.getElementById("newBoardBtn");
const shakeBtn = document.getElementById("shakeBtn");

function randomLetter() {
  return letters[Math.floor(Math.random() * letters.length)];
}

function updateDisplay() {
  timerEl.textContent = timeLeft;
  scoreEl.textContent = score;
}

function buildBoard() {
  boardEl.innerHTML = "";

  for (let i = 0; i < BOARD_SIZE; i++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = randomLetter();
    boardEl.appendChild(tile);
  }
}

function clearWords() {
  wordListEl.innerHTML = "";
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = ROUND_TIME;
  updateDisplay();

  timerInterval = setInterval(() => {
    timeLeft -= 1;

    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      updateDisplay();
      alert("Time's up! Final score: " + score);
      return;
    }

    updateDisplay();
  }, 1000);
}

function newBoard() {
  buildBoard();
  clearWords();
  guessEl.value = "";
  score = 0;
  startTimer();
  updateDisplay();
  setTimeout(() => {
    updateViewportLayout();
  }, 50);
}

function shakeBoard() {
  boardWrapEl.classList.remove("shake");
  void boardWrapEl.offsetWidth;
  boardWrapEl.classList.add("shake");

  buildBoard();
  clearWords();
  guessEl.value = "";
  score = 0;
  startTimer();
  updateDisplay();

  setTimeout(() => {
    updateViewportLayout();
  }, 50);
}

function submitWord() {
  if (timeLeft <= 0) return;

  const word = guessEl.value.trim();
  if (!word) return;

  const li = document.createElement("li");
  li.textContent = word;
  wordListEl.appendChild(li);

  score += word.length;
  guessEl.value = "";
  updateDisplay();

  setTimeout(() => {
    updateViewportLayout();
    guessEl.focus();
  }, 0);
}

function updateViewportHeightVar() {
  const vv = window.visualViewport;
  const height = vv ? vv.height : window.innerHeight;
  document.documentElement.style.setProperty("--vvh", `${height}px`);
}

function resetBoardWrapStyles() {
  boardWrapEl.style.maxHeight = "";
  boardWrapEl.style.overflow = "";
}

function updateViewportLayout() {
  updateViewportHeightVar();

  if (!window.visualViewport) {
    resetBoardWrapStyles();
    return;
  }

  const vv = window.visualViewport;
  const isMobile = window.innerWidth <= 600;
  const keyboardLikelyOpen = isMobile && vv.height < window.innerHeight * 0.78;

  if (!keyboardLikelyOpen) {
    resetBoardWrapStyles();
    return;
  }

  const rect = boardWrapEl.getBoundingClientRect();
  const inputRect = guessEl.getBoundingClientRect();

  const spaceAboveInput = inputRect.top - rect.top - 12;

  if (spaceAboveInput > 180) {
    boardWrapEl.style.maxHeight = `${spaceAboveInput}px`;
    boardWrapEl.style.overflow = "hidden";
  } else {
    resetBoardWrapStyles();
  }

  setTimeout(() => {
    guessEl.scrollIntoView({
      behavior: "smooth",
      block: "nearest"
    });
  }, 50);
}

submitBtn.addEventListener("click", submitWord);
newBoardBtn.addEventListener("click", newBoard);
shakeBtn.addEventListener("click", shakeBoard);

guessEl.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    submitWord();
  }
});

guessEl.addEventListener("focus", () => {
  setTimeout(() => {
    updateViewportLayout();
  }, 250);
});

guessEl.addEventListener("blur", () => {
  setTimeout(() => {
    resetBoardWrapStyles();
    updateViewportHeightVar();
  }, 100);
});

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", updateViewportLayout);
  window.visualViewport.addEventListener("scroll", updateViewportLayout);
}

window.addEventListener("resize", updateViewportLayout);
window.addEventListener("load", () => {
  newBoard();
  updateViewportLayout();
});
</script>
</body>
</html>
