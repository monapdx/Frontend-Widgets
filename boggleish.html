<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boggleish</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#f5f5f5;
}

h1{
    margin-bottom:10px;
}

.game{
    width:min(100%,420px);
}

.board{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:15px;
}

.tile{
    background:white;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    aspect-ratio:1;
    font-size:clamp(24px,6vw,36px);
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controls input{
    flex:1;
    padding:12px;
    font-size:16px;
}

.controls button{
    padding:12px 16px;
    font-size:16px;
    cursor:pointer;
}

.words{
    margin-top:15px;
}

@media (max-width:600px){

    body{
        padding:10px;
    }

    .controls{
        flex-direction:column;
    }

    .controls button{
        width:100%;
    }

    .controls input{
        width:100%;
    }

}
</style>
</head>

<body>

<h1>Boggleish</h1>

<div class="game">

<div class="board" id="board"></div>

<div class="controls">
<input id="guess" placeholder="Enter word">
<button onclick="submitWord()">Submit</button>
<button onclick="newBoard()">New Board</button>
</div>

<div class="words">
<strong>Found Words:</strong>
<ul id="wordList"></ul>
</div>

</div>

<script>

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"

function randomLetter(){
    return letters[Math.floor(Math.random()*letters.length)]
}

function newBoard(){

    const board = document.getElementById("board")
    board.innerHTML=""

    for(let i=0;i<16;i++){
        const tile = document.createElement("div")
        tile.className="tile"
        tile.textContent=randomLetter()
        board.appendChild(tile)
    }

}

function submitWord(){

    const input = document.getElementById("guess")
    const word = input.value.trim()

    if(!word) return

    const li = document.createElement("li")
    li.textContent = word

    document.getElementById("wordList").appendChild(li)

    input.value=""

}

newBoard()

</script>

</body>
</html>
