<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code block collapsible</title>
</head>
<body>

<div class="ui-codeblock" data-ui-codeblock data-collapsible="true">
  <div class="topbar">
    <div class="label">
      <span class="pill">JS</span>
      <span>Helper function</span>
    </div>

    <div class="ui-row">
      <button class="toggle" type="button" data-codeblock-toggle>Show more</button>

      <button class="ui-copy-btn" data-copy="#cb-2" data-copy-trim="true">
        <span class="ui-copy-icon" aria-hidden="true"></span>
        Copy
      </button>
    </div>
  </div>

  <pre id="cb-2"><code>// lots of code here...
function hello(){ console.log("hi"); }
</code></pre>
</div>

</body>
</html>
