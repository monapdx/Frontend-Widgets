<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSV → SQL Insert Statements</title>
<link rel="stylesheet" href="styles-vanilla.css" />
<style>
button.copied { background:#16a34a; color:white; }
.column-edit { width:100%; margin-bottom:6px; }
.notice { font-size:12px; color:#888; margin-top:8px; }
</style>
</head>
<body>

<div class="page-shell">
<header class="page-header">
  <h1>CSV → SQL</h1>
  <p>Paste or upload CSV → instantly get SQL</p>
</header>

<div class="widget-grid">

<section class="panel">
  <input id="csvInput" type="file" />
  <textarea id="csvText" placeholder="Paste CSV here"></textarea>

  <input id="tableName" value="my_table" />

  <label><input id="hasHeader" type="checkbox" checked> Header row</label>

  <h3>Columns</h3>
  <div id="columns"></div>

  <div class="actions">
    <button id="sample">Sample</button>
    <button id="clear">Clear</button>
  </div>
</section>

<section class="panel">
  <h3>SQL Output</h3>
  <pre id="output"></pre>

  <div class="actions">
    <button id="copy">Copy</button>
  </div>
</section>

</div>
</div>

<script>
const $ = s => document.querySelector(s);

let columns = [];
let rows = [];

function showCopied(btn){
  btn.classList.add("copied");
  btn.textContent="Copied ✓";
  setTimeout(()=>{
    btn.classList.remove("copied");
    btn.textContent="Copy";
  },1200);
}

function parseCSV(text){
  return text.trim().split("\n").map(r=>r.split(","));
}

function renderColumns(){
  $("#columns").innerHTML = columns.map((c,i)=>
    `<input class="column-edit" data-i="${i}" value="${c}">`
  ).join("");

  document.querySelectorAll(".column-edit").forEach(input=>{
    input.addEventListener("input", ()=>{
      columns[input.dataset.i]=input.value;
      build();
    });
  });
}

function build(){
  const text = $("#csvText").value.trim();
  if(!text) return;

  rows = parseCSV(text);

  if(rows.some(r=>r.length!==rows[0].length)){
    $("#output").textContent="-- Warning: inconsistent columns";
    return;
  }

  if($("#hasHeader").checked){
    columns = rows[0];
    rows = rows.slice(1);
  } else {
    columns = rows[0].map((_,i)=>`col_${i+1}`);
  }

  renderColumns();

  const table = $("#tableName").value;

  const sql = rows.map(r=>{
    const vals = r.map(v=>`'${v.replace(/'/g,"''")}'`);
    return `INSERT INTO ${table} (${columns.join(", ")}) VALUES (${vals.join(", ")});`;
  }).join("\n");

  $("#output").textContent = sql;
}

$("#csvText").addEventListener("input", build);
$("#tableName").addEventListener("input", build);
$("#hasHeader").addEventListener("change", build);

$("#copy").onclick = e=>{
  navigator.clipboard.writeText($("#output").textContent);
  showCopied(e.target);
};

$("#clear").onclick = ()=>{
  $("#csvText").value="";
  $("#output").textContent="";
};

$("#sample").onclick = ()=>{
  $("#csvText").value =
`id,name,email
1,Ash,ash@email.com
2,Loki,loki@email.com`;
  build();
};
</script>

</body>
</html>
