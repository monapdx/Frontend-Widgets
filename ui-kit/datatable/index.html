<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datatable</title>
  <link rel="stylesheet" href="../../ui-core/theme.css" />
  <link rel="stylesheet" href="component.css" />
    <style>
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
img, video, canvas, svg { max-width: 100%; height: auto; }

    </style>
</head>
<body>
  <main style="max-width: 1100px; margin: 3rem auto; padding: 1rem;">
    <h1>Datatable</h1>

    <section class="fw-datatable">
      <div class="fw-datatable__toolbar">
        <input
          class="fw-input fw-datatable__search"
          type="search"
          placeholder="Search rows..."
          data-datatable-search
        />
        <div class="fw-datatable__meta" data-datatable-meta></div>
      </div>

      <div class="fw-datatable__wrap">
        <table class="fw-table">
          <thead>
            <tr>
              <th><button class="fw-sort" data-sort-index="0">Name</button></th>
              <th><button class="fw-sort" data-sort-index="1">Type</button></th>
              <th><button class="fw-sort" data-sort-index="2">Status</button></th>
              <th><button class="fw-sort" data-sort-index="3">Price</button></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Word Bubbles</td>
              <td>Game</td>
              <td>Active</td>
              <td>19</td>
            </tr>
            <tr>
              <td>Frontend Widgets</td>
              <td>Toolkit</td>
              <td>Active</td>
              <td>29</td>
            </tr>
            <tr>
              <td>Inbox Archeology</td>
              <td>Archive Tool</td>
              <td>Beta</td>
              <td>39</td>
            </tr>
            <tr>
              <td>Data Distillery</td>
              <td>Analysis Tool</td>
              <td>Planning</td>
              <td>49</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../../ui-core/utils.js"></script>
  <script src="component.js"></script>
</body>
</html>
