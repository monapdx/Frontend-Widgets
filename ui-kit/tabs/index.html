<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Widgets - Tabs</title>
  <link rel="stylesheet" href="../../ui-core/theme.css" />
  <link rel="stylesheet" href="component.css" />
    <style>
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
img, video, canvas, svg { max-width: 100%; height: auto; }

    </style>
</head>
<body>
  <main style="max-width: 760px; margin: 3rem auto; padding: 1rem;">
    <h1>Tabs</h1>

    <div class="fw-tabs">
      <div class="fw-tablist" role="tablist" aria-label="Example tabs">
        <button class="fw-tab" role="tab" aria-selected="true">Overview</button>
        <button class="fw-tab" role="tab" aria-selected="false" tabindex="-1">Features</button>
        <button class="fw-tab" role="tab" aria-selected="false" tabindex="-1">Notes</button>
      </div>

      <section class="fw-tabpanel" role="tabpanel">
        <p>This is the overview panel.</p>
      </section>

      <section class="fw-tabpanel" role="tabpanel" hidden>
        <p>This is the features panel.</p>
      </section>

      <section class="fw-tabpanel" role="tabpanel" hidden>
        <p>This is the notes panel.</p>
      </section>
    </div>
  </main>

  <script src="component.js"></script>
</body>
</html>
